name: Build and Release WPF App

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Publish a final Release to the project page?'
        required: true
        type: boolean
        default: false
      version_tag:
        description: 'Release version tag'
        required: true
        type: string
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true
        cache: true
        cache-dependency-path: '**/ElectionManager.csproj'

    - name: Publish project (Single File)
      run: dotnet publish ElectionManager.csproj -c Release -f net10.0-windows -r win-x86 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishReadyToRun=true -o ./app_release

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: ElectionManager-Win-x86
        path: ./app_release/ElectionManager.exe

    - name: Publish GitHub Release
      if: ${{ inputs.create_release == true }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.version_tag }}
        name: "Release ${{ inputs.version_tag }}"
        body: "Build of the ElectionManager. Download the .exe file below."
        files: ./app_release/ElectionManager.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
